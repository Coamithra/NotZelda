<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MUD — Zelda-style Adventure</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: "Fira Mono", "Cascadia Code", "Consolas", monospace;
    font-size: 15px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ---------- Login screen ---------- */
  #login-screen {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #login-screen.hidden { display: none; }

  .login-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 2rem;
    width: 380px;
    max-width: 90vw;
  }
  .login-card h1 { color: #e6b422; font-size: 1.6rem; margin-bottom: .3rem; }
  .login-card p.subtitle { color: #8b949e; font-size: .85rem; margin-bottom: 1.5rem; }
  .login-card label { display: block; color: #8b949e; font-size: .8rem; margin-bottom: .3rem; }
  .login-card input {
    width: 100%; padding: .5rem .7rem; margin-bottom: 1rem;
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    color: #c9d1d9; font-family: inherit; font-size: .95rem;
  }
  .login-card input:focus { outline: none; border-color: #e6b422; }
  .login-card button {
    width: 100%; padding: .6rem; background: #e6b422; color: #0d1117;
    border: none; border-radius: 6px; font-family: inherit;
    font-size: 1rem; font-weight: 700; cursor: pointer;
  }
  .login-card button:hover { background: #d4a31c; }
  #login-error { color: #f85149; font-size: .85rem; margin-bottom: .8rem; min-height: 1.2em; }

  /* ---------- Game screen ---------- */
  #game-screen { display: none; flex-direction: column; align-items: center; }
  #game-screen.active { display: flex; }

  canvas {
    border: 2px solid #30363d;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ---------- Chat bar ---------- */
  #chat-bar {
    display: flex;
    width: 720px;
    background: #161b22;
    border: 2px solid #30363d;
    border-top: none;
  }
  #chat-bar.focused { border-color: #e6b422; }
  #chat-input {
    flex: 1; padding: .5rem .7rem;
    background: transparent; border: none;
    color: #c9d1d9; font-family: inherit; font-size: .9rem;
    outline: none;
  }
  #chat-input::placeholder { color: #484f58; }
  #chat-hint {
    padding: .5rem .7rem;
    color: #484f58; font-size: .8rem;
    align-self: center;
  }

  /* ---------- Mobile D-pad ---------- */
  #dpad {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 150px;
    z-index: 20;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .dpad-btn {
    position: absolute;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: rgba(255,255,255,0.7);
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .dpad-btn:active, .dpad-btn.active {
    background: rgba(230,180,34,0.4);
    border-color: #e6b422;
  }
  .dpad-up    { top: 0;   left: 50px; }
  .dpad-down  { bottom: 0; left: 50px; }
  .dpad-left  { top: 50px; left: 0; }
  .dpad-right { top: 50px; right: 0; }

  /* ---------- Mobile chat button ---------- */
  #mobile-chat-btn {
    display: none;
    position: fixed;
    bottom: 70px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    font-size: 22px;
    color: rgba(255,255,255,0.7);
    z-index: 20;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
  }

  #debug-btn {
    position: fixed;
    bottom: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    z-index: 20;
    cursor: pointer;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  /* ---------- Mobile overrides ---------- */
  body.mobile #dpad { display: block; }
  body.mobile #mobile-chat-btn { display: flex; align-items: center; justify-content: center; }
  body.mobile #debug-btn { bottom: 20px; right: 20px; width: 36px; height: 36px; font-size: 18px; }
  body.mobile #chat-bar { display: none; }
  body.mobile #chat-bar.focused {
    display: flex;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 30;
    border: 2px solid #e6b422;
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>Enter the MUD</h1>
    <p class="subtitle">A Zelda-style multiplayer adventure</p>
    <div id="login-error"></div>
    <label for="name-input">Your name</label>
    <input id="name-input" type="text" maxlength="20" placeholder="e.g. Aldric" autofocus>
    <label for="desc-input">Short description</label>
    <input id="desc-input" type="text" maxlength="80" placeholder="e.g. A wandering bard with a lute">
    <button id="connect-btn">Connect</button>
  </div>
</div>

<!-- Game -->
<div id="game-screen">
  <canvas id="game" width="720" height="528"></canvas>
  <div id="chat-bar">
    <input id="chat-input" type="text" placeholder="Press Enter to chat..." autocomplete="off">
    <span id="chat-hint">ESC to close</span>
  </div>
</div>

<!-- Mobile controls -->
<div id="dpad">
  <div class="dpad-btn dpad-up" data-dir="up">&#9650;</div>
  <div class="dpad-btn dpad-down" data-dir="down">&#9660;</div>
  <div class="dpad-btn dpad-left" data-dir="left">&#9664;</div>
  <div class="dpad-btn dpad-right" data-dir="right">&#9654;</div>
</div>
<button id="mobile-chat-btn">&#128172;</button>
<button id="debug-btn">&pi;</button>

<script src="tiles.js?v=2"></script>
<script src="sprites.js?v=2"></script>
<script src="music.js?v=9"></script>
<script>
(function () {
  // ---------------------------------------------------------------------------
  // Constants
  // ---------------------------------------------------------------------------
  const TILE = 16;
  const SCALE = 3;
  const TS = TILE * SCALE; // 48 — tile size on screen
  const COLS = 15;
  const ROWS = 11;
  const CW = COLS * TS; // 720
  const CH = ROWS * TS; // 528

  // ---------------------------------------------------------------------------
  // Mobile detection & scaling
  // ---------------------------------------------------------------------------
  const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
    || (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);

  if (isMobile) {
    document.body.classList.add("mobile");
  }

  function scaleForMobile() {
    if (!isMobile) return;
    const gameCanvas = document.getElementById("game");
    const vw = window.innerWidth;
    // Leave room for the D-pad at the bottom (~180px)
    const vh = window.innerHeight - 180;
    const scaleX = vw / CW;
    const scaleY = vh / CH;
    const s = Math.min(scaleX, scaleY);
    gameCanvas.style.width = (CW * s) + "px";
    gameCanvas.style.height = (CH * s) + "px";
  }

  if (isMobile) {
    window.addEventListener("resize", scaleForMobile);
    // Initial scale after DOM is ready
    scaleForMobile();
  }

  // ---------------------------------------------------------------------------
  // DOM
  // ---------------------------------------------------------------------------
  const loginScreen = document.getElementById("login-screen");
  const gameScreen  = document.getElementById("game-screen");
  const loginError  = document.getElementById("login-error");
  const nameInput   = document.getElementById("name-input");
  const descInput   = document.getElementById("desc-input");
  const connectBtn  = document.getElementById("connect-btn");
  const canvas      = document.getElementById("game");
  const ctx         = canvas.getContext("2d");
  const chatInput   = document.getElementById("chat-input");
  const chatBar     = document.getElementById("chat-bar");
  const chatHint    = document.getElementById("chat-hint");

  // ---------------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------------
  let ws = null;
  let myName = "";
  let myColorIndex = 0;
  let myPlayer = null;        // {x, y, direction, color_index}
  let otherPlayers = {};      // name -> {x, y, direction, color_index, displayX, displayY}
  let currentRoom = null;     // {name, tilemap, room_id}
  let speechBubbles = [];     // [{from, text, expires}]
  let keysDown = {};
  let lastMoveTime = 0;
  let chatFocused = false;
  let infoMessages = [];      // [{text, expires}]
  let showDebug = false;      // toggle with backtick key
  let dancingPlayers = {};    // name -> {dirs, step, nextTime}
  let attackingPlayers = {};  // name -> {direction, frame, nextTime}
  let guards = [];            // [{name, x, y}] — NPCs in current room
  let monsters = [];          // [{id, kind, x, y, displayX, displayY}]
  let dyingMonsters = [];     // [{kind, x, y, frame, nextTime}]
  let monsterHopFrame = 0;    // global hop frame toggled on timer
  let monsterHopTimer = 0;

  // Transition state
  let transition = null;      // {direction, oldCanvas, startTime, duration}



  // ---------------------------------------------------------------------------
  // Rendering
  // ---------------------------------------------------------------------------
  let animFrame = 0;
  let animTimer = 0;
  let isMoving = false;

  // Smooth movement interpolation
  let displayX = 0, displayY = 0;
  const MOVE_LERP = 0.3;

  function renderRoom() {
    if (!currentRoom) return;
    const tm = currentRoom.tilemap;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        ctx.drawImage(getTileCanvas(tm[r][c], TS, TILE, SCALE), c * TS, r * TS);
      }
    }
  }

  const DANCE_FRAME_MS = 200;  // time per dance frame

  function startDance(name) {
    dancingPlayers[name] = { frame: 0, nextTime: Date.now() };
    speechBubbles.push({
      from: name,
      text: "* dances *",
      expires: Date.now() + 3000,
    });
  }

  function stopDance(name) {
    delete dancingPlayers[name];
  }

  function updateDances() {
    const now = Date.now();
    for (const [name, d] of Object.entries(dancingPlayers)) {
      if (now >= d.nextTime) {
        d.frame++;
        d.nextTime = now + DANCE_FRAME_MS;
      }
    }
  }

  const DYING_MONSTER_FRAME_MS = 150;

  function updateDyingMonsters() {
    const now = Date.now();
    dyingMonsters = dyingMonsters.filter(dm => {
      if (now >= dm.nextTime) {
        dm.frame++;
        dm.nextTime = now + DYING_MONSTER_FRAME_MS;
      }
      return dm.frame < 3;
    });
  }

  const ATTACK_FRAME_MS = 150;  // time per attack frame
  const ATTACK_FRAMES = 2;      // total frames in attack animation

  function startAttack(name, direction) {
    stopDance(name);
    attackingPlayers[name] = { direction, frame: 0, nextTime: Date.now() + ATTACK_FRAME_MS };
  }

  function updateAttacks() {
    const now = Date.now();
    for (const [name, a] of Object.entries(attackingPlayers)) {
      if (now >= a.nextTime) {
        a.frame++;
        if (a.frame >= ATTACK_FRAMES) {
          delete attackingPlayers[name];
        } else {
          a.nextTime = now + ATTACK_FRAME_MS;
        }
      }
    }
  }

  function renderPlayers() {
    if (!myPlayer) return;

    // Collect all players
    const all = [];
    all.push({
      name: myName,
      x: displayX,
      y: displayY,
      direction: myPlayer.direction,
      color_index: myPlayer.color_index,
    });
    for (const [name, p] of Object.entries(otherPlayers)) {
      all.push({
        name: name,
        x: p.displayX,
        y: p.displayY,
        direction: p.direction,
        color_index: p.color_index,
      });
    }

    // Add guards to render list
    for (const g of guards) {
      all.push({ name: g.name, x: g.x, y: g.y, isGuard: true });
    }

    // Add monsters to render list
    for (const m of monsters) {
      all.push({ x: m.displayX, y: m.displayY, isMonster: true, kind: m.kind });
    }

    // Sort by Y for depth
    all.sort((a, b) => a.y - b.y);

    // Draw dying monsters (behind everything)
    for (const dm of dyingMonsters) {
      const dx = dm.x * TS, dy = dm.y * TS;
      if (dm.kind === "bat") drawBatDeath(ctx, dx, dy, dm.frame, SCALE);
      else if (dm.kind === "scorpion") drawScorpionDeath(ctx, dx, dy, dm.frame, SCALE);
      else if (dm.kind === "skeleton") drawSkeletonDeath(ctx, dx, dy, dm.frame, SCALE);
      else if (dm.kind === "swamp_blob") drawSwampBlobDeath(ctx, dx, dy, dm.frame, SCALE);
      else drawSlimeDeath(ctx, dx, dy, dm.frame, SCALE);
    }

    for (const p of all) {
      const px = p.x * TS;
      const py = p.y * TS;
      if (p.isMonster) {
        if (p.kind === "bat") drawBat(ctx, px, py, monsterHopFrame, SCALE);
        else if (p.kind === "scorpion") drawScorpion(ctx, px, py, monsterHopFrame, SCALE);
        else if (p.kind === "skeleton") drawSkeleton(ctx, px, py, monsterHopFrame, SCALE);
        else if (p.kind === "swamp_blob") drawSwampBlob(ctx, px, py, monsterHopFrame, SCALE);
        else drawSlime(ctx, px, py, monsterHopFrame, SCALE);
        continue;
      } else if (p.isGuard) {
        drawGuard(ctx, px, py, SCALE);
      } else if (attackingPlayers[p.name]) {
        const atk = attackingPlayers[p.name];
        drawPlayerAttack(ctx, px, py, atk.direction, p.color_index, atk.frame, SCALE);
        drawSwordAttack(ctx, px, py, atk.direction, atk.frame, SCALE);
      } else if (dancingPlayers[p.name]) {
        drawPlayerDance(ctx, px, py, p.color_index, dancingPlayers[p.name].frame, SCALE);
      } else {
        const moving = (p.name === myName) ? isMoving : (otherPlayers[p.name]?.moving || false);
        drawPlayer(ctx, px, py, p.direction, p.color_index, moving ? animFrame : 0, SCALE);
      }

      // Name label
      ctx.font = "bold 11px monospace";
      const tw = ctx.measureText(p.name).width;
      const labelX = px + TS / 2 - tw / 2;
      const labelY = py - 6;
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(labelX - 3, labelY - 10, tw + 6, 14);
      ctx.fillStyle = "#fff";
      ctx.fillText(p.name, labelX, labelY);
    }
  }

  function renderSpeechBubbles() {
    const now = Date.now();
    speechBubbles = speechBubbles.filter(b => now < b.expires);

    for (const bubble of speechBubbles) {
      // Find player position
      let px, py;
      if (bubble.from === myName) {
        px = displayX * TS + TS / 2;
        py = displayY * TS - 16;
      } else if (otherPlayers[bubble.from]) {
        const p = otherPlayers[bubble.from];
        px = p.displayX * TS + TS / 2;
        py = p.displayY * TS - 16;
      } else {
        // Check if it's a guard
        const guard = guards.find(g => g.name === bubble.from);
        if (guard) {
          px = guard.x * TS + TS / 2;
          py = guard.y * TS - 16;
        } else {
          continue;
        }
      }

      // Fade out in last 500ms
      const timeLeft = bubble.expires - now;
      const alpha = timeLeft < 500 ? timeLeft / 500 : 1;
      ctx.globalAlpha = alpha;

      // Measure text
      ctx.font = "11px monospace";
      const maxWidth = 200;
      const words = bubble.text.split(" ");
      const lines = [];
      let line = "";
      for (const word of words) {
        const test = line ? line + " " + word : word;
        if (ctx.measureText(test).width > maxWidth) {
          if (line) lines.push(line);
          line = word;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      if (lines.length > 3) lines.length = 3;

      const lineHeight = 14;
      const pad = 6;
      const bw = Math.min(maxWidth, Math.max(...lines.map(l => ctx.measureText(l).width))) + pad * 2;
      const bh = lines.length * lineHeight + pad * 2;
      const bx = px - bw / 2;
      const by = py - bh - 8;

      // Background
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.beginPath();
      roundRect(ctx, bx, by, bw, bh, 6);
      ctx.fill();

      // Tail
      ctx.beginPath();
      ctx.moveTo(px - 5, by + bh);
      ctx.lineTo(px, by + bh + 6);
      ctx.lineTo(px + 5, by + bh);
      ctx.fill();

      // Border
      ctx.strokeStyle = "rgba(0,0,0,0.2)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      roundRect(ctx, bx, by, bw, bh, 6);
      ctx.stroke();

      // Text
      ctx.fillStyle = "#111";
      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], bx + pad, by + pad + 10 + i * lineHeight);
      }

      ctx.globalAlpha = 1;
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
  }

  function renderUI() {
    if (!currentRoom) return;

    // Room name — top left
    ctx.font = "bold 13px monospace";
    const name = currentRoom.name;
    const tw = ctx.measureText(name).width;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(8, 8, tw + 16, 22);
    ctx.fillStyle = "#e6b422";
    ctx.fillText(name, 16, 24);

    // Version — top right
    const version = "v0.5";
    ctx.font = "10px monospace";
    const vw = ctx.measureText(version).width;
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    ctx.fillText(version, CW - vw - 10, 20);

    // Exit arrows
    const exits = getExitDirs();
    ctx.font = "bold 20px monospace";
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    if (exits.has("north")) ctx.fillText("\u25B2", CW/2 - 8, 20);
    if (exits.has("south")) ctx.fillText("\u25BC", CW/2 - 8, CH - 6);
    if (exits.has("west"))  ctx.fillText("\u25C0", 4, CH/2 + 6);
    if (exits.has("east"))  ctx.fillText("\u25B6", CW - 18, CH/2 + 6);

    // Info messages
    const now = Date.now();
    infoMessages = infoMessages.filter(m => now < m.expires);
    ctx.font = "12px monospace";
    for (let i = 0; i < infoMessages.length; i++) {
      const msg = infoMessages[i];
      const alpha = Math.min(1, (msg.expires - now) / 1000);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "rgba(0,0,0,0.7)";
      const mw = ctx.measureText(msg.text).width;
      ctx.fillRect(CW/2 - mw/2 - 8, CH - 60 - i*20, mw + 16, 18);
      ctx.fillStyle = "#79c0ff";
      ctx.fillText(msg.text, CW/2 - mw/2, CH - 47 - i*20);
      ctx.globalAlpha = 1;
    }

    // Debug overlay — shows connection events on screen (toggle with backtick key)
    if (showDebug && debugLog.length > 0) {
      ctx.font = "9px monospace";
      const lineH = 12;
      const padding = 4;
      const boxH = debugLog.length * lineH + padding * 2;
      ctx.fillStyle = "rgba(0,0,0,0.75)";
      ctx.fillRect(4, CH - boxH - 4, CW - 8, boxH);
      ctx.fillStyle = "#0f0";
      for (let i = 0; i < debugLog.length; i++) {
        ctx.fillText(debugLog[i], 8, CH - boxH + padding + (i + 1) * lineH - 2);
      }
    }
  }

  // matches server WALKABLE_TILES
  const WALKABLE = new Set([0, 1, 2, 7, 8, 9, 10, 15, 16, 19, 20, 22, 26, 27, 28, 30]);

  function getExitDirs() {
    if (!currentRoom || !currentRoom.room_id) return new Set();
    const tm = currentRoom.tilemap;
    const dirs = new Set();
    const w = (t) => WALKABLE.has(t);
    // North
    if (w(tm[0][6]) || w(tm[0][7]) || w(tm[0][8])) dirs.add("north");
    // South
    if (w(tm[10][6]) || w(tm[10][7]) || w(tm[10][8])) dirs.add("south");
    // West
    if (w(tm[4][0]) || w(tm[5][0]) || w(tm[6][0])) dirs.add("west");
    // East
    if (w(tm[4][14]) || w(tm[5][14]) || w(tm[6][14])) dirs.add("east");
    return dirs;
  }

  // ---------------------------------------------------------------------------
  // Transitions
  // ---------------------------------------------------------------------------
  function renderTransition(now) {
    if (!transition) return;
    const elapsed = now - transition.startTime;
    const progress = Math.min(1, elapsed / transition.duration);

    if (transition.type === "fade") {
      // Fade for stairs
      if (progress < 0.5) {
        // Draw old room snapshot, fade to black
        ctx.drawImage(transition.oldCanvas, 0, 0);
        ctx.fillStyle = `rgba(0,0,0,${progress * 2})`;
        ctx.fillRect(0, 0, CW, CH);
      } else {
        // Draw new room, fade from black
        renderRoom();
        renderPlayers();
        renderUI();
        ctx.fillStyle = `rgba(0,0,0,${(1 - progress) * 2})`;
        ctx.fillRect(0, 0, CW, CH);
      }
    } else {
      // Slide transition — the old room slides off-screen and the new room
      // slides in from the direction the player is travelling toward.
      //
      // "north" means the player walked north, so the old room slides DOWN
      // (positive Y) and the new room enters from the TOP (negative Y).
      const dir = transition.direction;
      let ox = 0, oy = 0;
      if (dir === "north") oy =  CH * progress;
      if (dir === "south") oy = -CH * progress;
      if (dir === "west")  ox =  CW * progress;
      if (dir === "east")  ox = -CW * progress;

      // Draw the new room first (it will be partially hidden behind the old room)
      ctx.save();
      if (dir === "north") ctx.translate(0, oy - CH);   // enters from top
      if (dir === "south") ctx.translate(0, oy + CH);   // enters from bottom
      if (dir === "west")  ctx.translate(ox - CW, 0);   // enters from left
      if (dir === "east")  ctx.translate(ox + CW, 0);   // enters from right
      renderRoom();
      renderPlayers();
      renderUI();
      ctx.restore();

      // Draw old room snapshot sliding out on top
      ctx.drawImage(transition.oldCanvas, ox, oy);
    }

    if (progress >= 1) {
      transition = null;
    }
  }

  // ---------------------------------------------------------------------------
  // Game loop
  // ---------------------------------------------------------------------------
  function gameLoop(timestamp) {
    requestAnimationFrame(gameLoop);

    // Animation timer
    animTimer++;
    if (animTimer % 10 === 0) {
      animFrame = (animFrame + 1) % 2;
    }

    // Process movement (freeze while attacking)
    if (!chatFocused && !transition && !attackingPlayers[myName]) {
      processMovement(timestamp);
    }

    // Update dance, attack, and monster animations
    updateDances();
    updateAttacks();
    updateDyingMonsters();

    // Toggle monster hop frame every ~500ms
    monsterHopTimer++;
    if (monsterHopTimer % 30 === 0) {
      monsterHopFrame = (monsterHopFrame + 1) % 2;
    }

    // Interpolate positions
    if (myPlayer) {
      displayX += (myPlayer.x - displayX) * MOVE_LERP;
      displayY += (myPlayer.y - displayY) * MOVE_LERP;
      // Snap when very close
      if (Math.abs(myPlayer.x - displayX) < 0.05) displayX = myPlayer.x;
      if (Math.abs(myPlayer.y - displayY) < 0.05) displayY = myPlayer.y;
      isMoving = (displayX !== myPlayer.x || displayY !== myPlayer.y);
    }

    for (const p of Object.values(otherPlayers)) {
      p.displayX += (p.x - p.displayX) * MOVE_LERP;
      p.displayY += (p.y - p.displayY) * MOVE_LERP;
      if (Math.abs(p.x - p.displayX) < 0.05) p.displayX = p.x;
      if (Math.abs(p.y - p.displayY) < 0.05) p.displayY = p.y;
      p.moving = (p.displayX !== p.x || p.displayY !== p.y);
    }

    for (const m of monsters) {
      m.displayX += (m.x - m.displayX) * MOVE_LERP;
      m.displayY += (m.y - m.displayY) * MOVE_LERP;
      if (Math.abs(m.x - m.displayX) < 0.05) m.displayX = m.x;
      if (Math.abs(m.y - m.displayY) < 0.05) m.displayY = m.y;
    }

    // Render
    ctx.clearRect(0, 0, CW, CH);

    if (transition) {
      renderTransition(Date.now());
    } else {
      renderRoom();
      renderPlayers();
      renderSpeechBubbles();
      renderUI();
    }
  }

  function processMovement(timestamp) {
    if (timestamp - lastMoveTime < 125) return;

    let dir = null;
    if (keysDown["ArrowUp"] || keysDown["KeyW"]) dir = "up";
    else if (keysDown["ArrowDown"] || keysDown["KeyS"]) dir = "down";
    else if (keysDown["ArrowLeft"] || keysDown["KeyA"]) dir = "left";
    else if (keysDown["ArrowRight"] || keysDown["KeyD"]) dir = "right";

    if (dir && ws && ws.readyState === WebSocket.OPEN) {
      stopDance(myName);
      ws.send(JSON.stringify({ type: "move", direction: dir }));
      lastMoveTime = timestamp;
    }
  }

  // ---------------------------------------------------------------------------
  // WebSocket
  // ---------------------------------------------------------------------------
  // Debug log — on-screen overlay so mobile users can screenshot it
  // ---------------------------------------------------------------------------
  const debugLog = [];
  const MAX_DEBUG_LINES = 8;
  function dbg(msg) {
    const ts = new Date().toLocaleTimeString();
    const line = `${ts} ${msg}`;
    console.log("[WS] " + msg);
    debugLog.push(line);
    if (debugLog.length > MAX_DEBUG_LINES) debugLog.shift();
  }

  // ---------------------------------------------------------------------------
  let lastLoginName = "";
  let lastLoginDesc = "";
  let reconnectTimer = null;
  let pingInterval = null;
  let reconnectCount = 0;

  function connect(name, description) {
    lastLoginName = name;
    lastLoginDesc = description;
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }

    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    dbg(`Connecting...`);
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => {
      dbg(`Connected, logging in`);
      reconnectCount = 0;
      ws.send(JSON.stringify({ type: "login", name, description }));
      // App-level keepalive every 15s (helps keep mobile connections alive)
      pingInterval = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "ping" }));
        }
      }, 15000);
    };

    ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === "pong") return; // keepalive response, ignore
      handleMessage(msg);
    };

    ws.onclose = (ev) => {
      dbg(`Closed: code=${ev.code} reason='${ev.reason}' clean=${ev.wasClean}`);
      if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
      // Only auto-reconnect if we were logged in (past the login screen)
      if (!loginScreen.classList.contains("hidden")) return;
      infoMessages.push({ text: "Disconnected — reconnecting...", expires: Date.now() + 4000 });
      scheduleReconnect();
    };

    ws.onerror = (ev) => {
      dbg(`Error event`);
      loginError.textContent = "Could not connect to server.";
    };
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectCount++;
    // Back off: 2s, 4s, 6s... up to 10s
    const delay = Math.min(reconnectCount * 2000, 10000);
    dbg(`Reconnect #${reconnectCount} in ${delay/1000}s`);
    reconnectTimer = setTimeout(() => {
      reconnectTimer = null;
      connect(lastLoginName, lastLoginDesc);
    }, delay);
  }

  // Mobile phones suspend WebSocket when tab goes to background.
  // When user comes back, check connection and reconnect if needed.
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible" && loginScreen.classList.contains("hidden")) {
      dbg(`Tab visible, ws.readyState=${ws ? ws.readyState : 'null'}`);
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        dbg(`Connection dead on resume, reconnecting`);
        infoMessages.push({ text: "Reconnecting...", expires: Date.now() + 3000 });
        connect(lastLoginName, lastLoginDesc);
      }
    }
  });

  function handleMessage(msg) {
    switch (msg.type) {
      case "login_ok":
        myColorIndex = msg.color_index;
        loginScreen.classList.add("hidden");
        gameScreen.classList.add("active");
        MusicPlayer.start();
        requestAnimationFrame(gameLoop);
        break;

      case "room_enter": {
        // Capture the old room as a canvas snapshot (drawImage works with
        // negative coordinates and compositing; putImageData does not).
        let oldCanvas = null;
        const prevRoom = currentRoom;
        if (prevRoom) {
          oldCanvas = document.createElement("canvas");
          oldCanvas.width = CW;
          oldCanvas.height = CH;
          oldCanvas.getContext("2d").drawImage(canvas, 0, 0);
        }

        const prevExits = currentRoom ? currentRoom.exits : null;
        currentRoom = {
          name: msg.name,
          tilemap: msg.tilemap,
          room_id: msg.room_id,
          exits: msg.exits || {},
          biome: msg.biome || "town",
        };
        myPlayer = {
          x: msg.your_pos.x,
          y: msg.your_pos.y,
          direction: myPlayer ? myPlayer.direction : "down",
          color_index: myColorIndex,
        };

        MusicPlayer.setRoom(msg.room_id, msg.biome);

        // Reset other players, guards, monsters, and bubbles for this room
        otherPlayers = {};
        dancingPlayers = {};
        attackingPlayers = {};
        speechBubbles = [];
        guards = msg.guards || [];
        dyingMonsters = [];
        monsters = (msg.monsters || []).map(m => ({
          id: m.id, kind: m.kind, x: m.x, y: m.y, displayX: m.x, displayY: m.y,
        }));
        for (const p of msg.players) {
          otherPlayers[p.name] = {
            x: p.x, y: p.y,
            displayX: p.x, displayY: p.y,
            direction: p.direction,
            color_index: p.color_index,
            moving: false,
          };
          if (p.dancing) startDance(p.name);
        }

        // Snap display position immediately so the new room renders correctly
        displayX = myPlayer.x;
        displayY = myPlayer.y;

        if (oldCanvas && prevRoom) {
          // Determine transition direction
          const transDir = guessTransitionDir(prevRoom.room_id, msg.room_id, msg.exit_direction, prevExits);
          const isFade = transDir === "up" || transDir === "down";
          transition = {
            type: isFade ? "fade" : "slide",
            direction: transDir,
            oldCanvas: oldCanvas,
            startTime: Date.now(),
            duration: isFade ? 500 : 300,
          };
        }
        break;
      }

      case "player_moved":
        stopDance(msg.name);
        delete attackingPlayers[msg.name];
        if (msg.name === myName) {
          myPlayer.x = msg.x;
          myPlayer.y = msg.y;
          myPlayer.direction = msg.direction;
        } else if (otherPlayers[msg.name]) {
          otherPlayers[msg.name].x = msg.x;
          otherPlayers[msg.name].y = msg.y;
          otherPlayers[msg.name].direction = msg.direction;
        }
        break;

      case "player_entered":
        if (msg.name !== myName) {
          otherPlayers[msg.name] = {
            x: msg.x, y: msg.y,
            displayX: msg.x, displayY: msg.y,
            direction: msg.direction,
            color_index: msg.color_index,
            moving: false,
          };
          if (msg.dancing) startDance(msg.name);
        }
        break;

      case "player_left":
        delete otherPlayers[msg.name];
        stopDance(msg.name);
        break;

      case "attack":
        startAttack(msg.name, msg.direction);
        break;

      case "dance":
        startDance(msg.name);
        break;

      case "chat":
        speechBubbles.push({
          from: msg.from,
          text: msg.text,
          expires: Date.now() + 4000,
        });
        break;

      case "monster_moved": {
        const mon = monsters.find(m => m.id === msg.id);
        if (mon) { mon.x = msg.x; mon.y = msg.y; }
        break;
      }

      case "monster_killed": {
        const idx = monsters.findIndex(m => m.id === msg.id);
        if (idx !== -1) {
          const mon = monsters[idx];
          dyingMonsters.push({ kind: mon.kind, x: msg.x, y: msg.y, frame: 0, nextTime: Date.now() + DYING_MONSTER_FRAME_MS });
          monsters.splice(idx, 1);
        }
        break;
      }

      case "monster_hit": {
        // Flash the monster white briefly to show damage
        const hitMon = monsters.find(m => m.id === msg.id);
        if (hitMon) {
          hitMon.hitFlash = Date.now() + 200;
        }
        break;
      }

      case "monster_spawned":
        monsters.push({ id: msg.id, kind: msg.kind, x: msg.x, y: msg.y, displayX: msg.x, displayY: msg.y });
        break;

      case "info":
        const lines = msg.text.split("\n");
        for (const line of lines) {
          infoMessages.push({ text: line, expires: Date.now() + 5000 });
        }
        break;

      case "error":
        loginError.textContent = msg.text;
        break;
    }
  }

  // Transition direction comes from server's exit_direction field.
  // Fallback: scan old room exits to find which direction leads to the new room.
  function guessTransitionDir(fromId, toId, exitDir, fromExits) {
    if (exitDir) return exitDir;
    // Fallback: search the old room's exits dict
    if (fromExits) {
      for (const [dir, target] of Object.entries(fromExits)) {
        if (target === toId) return dir;
      }
    }
    return "north";
  }

  // ---------------------------------------------------------------------------
  // Input
  // ---------------------------------------------------------------------------
  document.addEventListener("keydown", (e) => {
    if (e.target === nameInput || e.target === descInput) return;

    keysDown[e.code] = true;

    // Enter focuses chat
    if (e.key === "Enter" && !chatFocused) {
      e.preventDefault();
      chatInput.focus();
      chatFocused = true;
      chatBar.classList.add("focused");
      return;
    }

    // Escape blurs chat
    if (e.key === "Escape" && chatFocused) {
      e.preventDefault();
      chatInput.blur();
      chatFocused = false;
      chatBar.classList.remove("focused");
      return;
    }

    // Toggle music with M
    if (e.key === "m" && !chatFocused) {
      const on = MusicPlayer.toggle();
      infoMessages.push({ text: on ? "Music on" : "Music off", expires: Date.now() + 2000 });
      return;
    }

    // Toggle debug overlay with backtick
    if (e.key === "`" && !chatFocused) {
      showDebug = !showDebug;
      return;
    }

    // Attack with Space
    if (e.code === "Space" && !e.repeat && !chatFocused && !attackingPlayers[myName]) {
      e.preventDefault();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "attack" }));
      }
      return;
    }

    // Prevent arrow keys from scrolling
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key) && !chatFocused) {
      e.preventDefault();
    }
  });

  document.addEventListener("keyup", (e) => {
    delete keysDown[e.code];
  });

  // Chat input
  chatInput.addEventListener("focus", () => {
    chatFocused = true;
    chatBar.classList.add("focused");
  });

  chatInput.addEventListener("blur", () => {
    chatFocused = false;
    chatBar.classList.remove("focused");
  });

  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const text = chatInput.value.trim();
      if (text && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "chat", text }));
      }
      chatInput.value = "";
      chatInput.blur();
      chatFocused = false;
      chatBar.classList.remove("focused");
      e.preventDefault();
    }
    if (e.key === "Escape") {
      chatInput.blur();
      chatFocused = false;
      chatBar.classList.remove("focused");
      e.preventDefault();
    }
    // Stop propagation so arrow keys work in input
    e.stopPropagation();
  });

  // Login
  connectBtn.addEventListener("click", () => {
    const name = nameInput.value.trim();
    if (!name) {
      loginError.textContent = "Please enter a name.";
      return;
    }
    myName = name;
    loginError.textContent = "";
    MusicPlayer.start(); // must be called during a user gesture for autoplay policy
    connect(name, descInput.value.trim());
  });

  [nameInput, descInput].forEach(el => {
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter") connectBtn.click();
      e.stopPropagation();
    });
  });

  // ---------------------------------------------------------------------------
  // Mobile D-pad controls
  // ---------------------------------------------------------------------------
  if (isMobile) {
    let dpadInterval = null;
    let activeDir = null;

    function startDpad(dir) {
      if (activeDir === dir) return;
      stopDpad();
      stopDance(myName);
      activeDir = dir;
      // Send immediately, then repeat
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "move", direction: dir }));
      }
      dpadInterval = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "move", direction: dir }));
        }
      }, 150);
    }

    function stopDpad() {
      if (dpadInterval) {
        clearInterval(dpadInterval);
        dpadInterval = null;
      }
      activeDir = null;
      document.querySelectorAll(".dpad-btn").forEach(b => b.classList.remove("active"));
    }

    document.querySelectorAll(".dpad-btn").forEach(btn => {
      const dir = btn.dataset.dir;

      btn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        btn.classList.add("active");
        startDpad(dir);
      });

      btn.addEventListener("touchend", (e) => {
        e.preventDefault();
        stopDpad();
      });

      btn.addEventListener("touchcancel", (e) => {
        e.preventDefault();
        stopDpad();
      });
    });

    // Mobile chat button
    document.getElementById("mobile-chat-btn").addEventListener("click", () => {
      chatInput.focus();
      chatFocused = true;
      chatBar.classList.add("focused");
    });

    // Re-scale when login completes and game screen appears
    const origHandleMsg = handleMessage;
    handleMessage = function(msg) {
      origHandleMsg(msg);
      if (msg.type === "login_ok") {
        setTimeout(scaleForMobile, 50);
      }
    };
  }

  // Debug overlay toggle — works on all devices
  document.getElementById("debug-btn").addEventListener("click", () => {
    showDebug = !showDebug;
  });

})();
</script>
</body>
</html>
