<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MUD — Zelda-style Adventure</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: "Fira Mono", "Cascadia Code", "Consolas", monospace;
    font-size: 15px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ---------- Login screen ---------- */
  #login-screen {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #login-screen.hidden { display: none; }

  .login-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 2rem;
    width: 380px;
    max-width: 90vw;
  }
  .login-card h1 { color: #e6b422; font-size: 1.6rem; margin-bottom: .3rem; }
  .login-card p.subtitle { color: #8b949e; font-size: .85rem; margin-bottom: 1.5rem; }
  .login-card label { display: block; color: #8b949e; font-size: .8rem; margin-bottom: .3rem; }
  .login-card input {
    width: 100%; padding: .5rem .7rem; margin-bottom: 1rem;
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    color: #c9d1d9; font-family: inherit; font-size: .95rem;
  }
  .login-card input:focus { outline: none; border-color: #e6b422; }
  .login-card button {
    width: 100%; padding: .6rem; background: #e6b422; color: #0d1117;
    border: none; border-radius: 6px; font-family: inherit;
    font-size: 1rem; font-weight: 700; cursor: pointer;
  }
  .login-card button:hover { background: #d4a31c; }
  #login-error { color: #f85149; font-size: .85rem; margin-bottom: .8rem; min-height: 1.2em; }

  /* ---------- Game screen ---------- */
  #game-screen { display: none; flex-direction: row; align-items: flex-start; justify-content: center; gap: 0; }
  #game-screen.active { display: flex; }

  #game-col { display: flex; flex-direction: column; align-items: center; }

  canvas {
    border: 2px solid #30363d;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ---------- Server log panel ---------- */
  #server-log {
    display: none;
    width: 340px;
    height: 530px;
    background: #0d1117;
    border: 2px solid #30363d;
    border-left: none;
    overflow-y: auto;
    padding: 6px 8px;
    font-family: "Fira Mono", "Cascadia Code", "Consolas", monospace;
    font-size: 11px;
    line-height: 1.4;
    color: #8b949e;
    scrollbar-width: thin;
    scrollbar-color: #30363d #0d1117;
  }
  #server-log.active { display: block; }
  #server-log .log-line { white-space: pre-wrap; word-break: break-all; }
  #server-log .log-line.highlight { color: #e6b422; }
  #server-log .log-line.error { color: #f85149; }
  #server-log .log-line.regen { color: #3fb950; }
  #server-log .log-line.deprecation { color: #d2a8ff; }

  /* ---------- Chat log ---------- */
  #chat-log {
    width: 720px;
    height: 120px;
    background: #0d1117;
    border: 2px solid #30363d;
    border-top: none;
    overflow-y: auto;
    padding: 4px 8px;
    font-size: .8rem;
    color: #8b949e;
    scrollbar-width: thin;
    scrollbar-color: #30363d #0d1117;
  }
  #chat-log .chat-line { margin: 2px 0; line-height: 1.3; }
  #chat-log .chat-name { color: #e6b422; font-weight: bold; }
  #chat-log .chat-npc { color: #d2a8ff; }
  #chat-log .chat-system { color: #484f58; font-style: italic; }

  /* ---------- Chat bar ---------- */
  #chat-bar {
    display: flex;
    width: 720px;
    background: #161b22;
    border: 2px solid #30363d;
    border-top: none;
  }
  #chat-bar.focused { border-color: #e6b422; }
  #chat-input {
    flex: 1; padding: .5rem .7rem;
    background: transparent; border: none;
    color: #c9d1d9; font-family: inherit; font-size: .9rem;
    outline: none;
  }
  #chat-input::placeholder { color: #484f58; }
  #chat-hint {
    padding: .5rem .7rem;
    color: #484f58; font-size: .8rem;
    align-self: center;
  }

  /* ---------- Mobile D-pad ---------- */
  #dpad {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 150px;
    z-index: 20;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .dpad-btn {
    position: absolute;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: rgba(255,255,255,0.7);
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .dpad-btn:active, .dpad-btn.active {
    background: rgba(230,180,34,0.4);
    border-color: #e6b422;
  }
  .dpad-up    { top: 0;   left: 50px; }
  .dpad-down  { bottom: 0; left: 50px; }
  .dpad-left  { top: 50px; left: 0; }
  .dpad-right { top: 50px; right: 0; }

  /* ---------- Mobile action buttons ---------- */
  #mobile-chat-btn, #mobile-sword-btn {
    display: none;
    position: fixed;
    width: 50px;
    height: 50px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    font-size: 22px;
    color: rgba(255,255,255,0.7);
    z-index: 20;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
  }
  #mobile-chat-btn { bottom: 70px; right: 20px; }
  #mobile-sword-btn { bottom: 130px; right: 20px; }
  #mobile-sword-btn:active, #mobile-sword-btn.active {
    background: rgba(230,180,34,0.4);
    border-color: #e6b422;
  }

  #debug-btn {
    position: fixed;
    bottom: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    z-index: 20;
    cursor: pointer;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  /* ---------- Mobile overrides ---------- */
  body.mobile #chat-log { display: none; }
  body.mobile #dpad { display: block; }
  body.mobile #mobile-chat-btn, body.mobile #mobile-sword-btn { display: flex; align-items: center; justify-content: center; }
  body.mobile #debug-btn { bottom: 20px; right: 20px; width: 36px; height: 36px; font-size: 18px; }
  body.mobile #chat-bar { display: none; }
  body.mobile #chat-bar.focused {
    display: flex;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 30;
    border: 2px solid #e6b422;
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <h1>Enter the MUD</h1>
    <p class="subtitle">A Zelda-style multiplayer adventure</p>
    <div id="login-error"></div>
    <label for="name-input">Your name</label>
    <input id="name-input" type="text" maxlength="20" placeholder="e.g. Aldric" autofocus>
    <label for="desc-input">Short description</label>
    <input id="desc-input" type="text" maxlength="80" placeholder="e.g. A wandering bard with a lute">
    <button id="connect-btn">Connect</button>
  </div>
</div>

<!-- Game -->
<div id="game-screen">
  <div id="game-col">
    <canvas id="game" width="720" height="528"></canvas>
    <div id="chat-log"></div>
    <div id="chat-bar">
      <input id="chat-input" type="text" placeholder="Press Enter to chat..." autocomplete="off">
      <span id="chat-hint">ESC to close</span>
    </div>
  </div>
  <div id="server-log"></div>
</div>

<!-- Mobile controls -->
<div id="dpad">
  <div class="dpad-btn dpad-up" data-dir="up">&#9650;</div>
  <div class="dpad-btn dpad-down" data-dir="down">&#9660;</div>
  <div class="dpad-btn dpad-left" data-dir="left">&#9664;</div>
  <div class="dpad-btn dpad-right" data-dir="right">&#9654;</div>
</div>
<button id="mobile-sword-btn">&#9876;</button>
<button id="mobile-chat-btn">&#128172;</button>
<button id="debug-btn">&pi;</button>

<!-- Game scripts — load order matters -->
<script src="game_state.js?v=3"></script>
<script src="tiles.js?v=3"></script>
<script src="sprite_data.js?v=3"></script>
<script src="sprites.js?v=3"></script>
<script src="music.js?v=9"></script>
<script src="renderer.js?v=2"></script>
<script src="net.js?v=3"></script>
<script>
// ---------------------------------------------------------------------------
// Init — bind DOM refs and start game loop
// ---------------------------------------------------------------------------

// Mobile detection
G.isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  || (navigator.maxTouchPoints > 1 && window.innerWidth < 1024);

if (G.isMobile) {
  document.body.classList.add("mobile");
}

function scaleForMobile() {
  if (!G.isMobile) return;
  const gameCanvas = document.getElementById("game");
  const vw = window.innerWidth;
  const vh = window.innerHeight - 180;
  const scaleX = vw / CW;
  const scaleY = vh / CH;
  const s = Math.min(scaleX, scaleY);
  gameCanvas.style.width = (CW * s) + "px";
  gameCanvas.style.height = (CH * s) + "px";
}

if (G.isMobile) {
  window.addEventListener("resize", scaleForMobile);
  scaleForMobile();
}

// Bind DOM refs
G.loginScreen = document.getElementById("login-screen");
G.gameScreen  = document.getElementById("game-screen");
G.loginError  = document.getElementById("login-error");
G.nameInput   = document.getElementById("name-input");
G.descInput   = document.getElementById("desc-input");
G.connectBtn  = document.getElementById("connect-btn");
G.canvas      = document.getElementById("game");
G.ctx         = G.canvas.getContext("2d");
G.chatInput   = document.getElementById("chat-input");
G.chatBar     = document.getElementById("chat-bar");
G.chatHint    = document.getElementById("chat-hint");
G.chatLog     = document.getElementById("chat-log");
G.serverLog   = document.getElementById("server-log");

// ---------------------------------------------------------------------------
// Game loop
// ---------------------------------------------------------------------------
// ---------------------------------------------------------------------------
// Client-side prediction helpers
// ---------------------------------------------------------------------------
const DIR_DX = { up: 0, down: 0, left: -1, right: 1 };
const DIR_DY = { up: -1, down: 1, left: 0, right: 0 };

function getActiveDirection() {
  if (G.keysDown["ArrowUp"] || G.keysDown["KeyW"]) return "up";
  if (G.keysDown["ArrowDown"] || G.keysDown["KeyS"]) return "down";
  if (G.keysDown["ArrowLeft"] || G.keysDown["KeyA"]) return "left";
  if (G.keysDown["ArrowRight"] || G.keysDown["KeyD"]) return "right";
  return null;
}

function sendToServer(msg) {
  if (G.ws && G.ws.readyState === WebSocket.OPEN) {
    G.ws.send(JSON.stringify(msg));
  }
}

function isTransitionTile(x, y) {
  if (!G.currentRoom) return false;
  const tile = G.currentRoom.tilemap[y][x];
  const exits = G.currentRoom.exits;
  if ((tile === "SU" || tile === 9) && exits.up) return true;
  if ((tile === "SD" || tile === 10) && exits.down) return true;
  return false;
}

function canPredictWalk(x, y) {
  if (!G.currentRoom) return false;
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return false;
  if (isTransitionTile(x, y)) return false;
  const tile = G.currentRoom.tilemap[y][x];
  if (!WALKABLE.has(tile)) return false;
  for (const guard of G.guards) {
    if (guard.x === x && guard.y === y) return false;
  }
  return true;
}

function tryStartMove(dir) {
  if (!G.myPlayer || !G.currentRoom) return;
  const nx = G.myPlayer.x + DIR_DX[dir];
  const ny = G.myPlayer.y + DIR_DY[dir];

  const wasAlreadyFacing = (G.myPlayer.direction === dir);
  G.myPlayer.direction = dir;

  // Walkable and predictable — start client-side predicted move
  if (canPredictWalk(nx, ny)) {
    G.moveState = {
      fromX: G.myPlayer.x, fromY: G.myPlayer.y,
      toX: nx, toY: ny,
      dir: dir,
      progress: 0,
      committed: false,
    };
    return;
  }

  // Off-grid or transition tile — delegate to server (room transitions)
  const offGrid = (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS);
  const transition = !offGrid && isTransitionTile(nx, ny);
  if (offGrid || transition) {
    const now = performance.now();
    if (now - G.lastServerMoveTime < 200) return;
    G.lastServerMoveTime = now;
    sendToServer({ type: "move", direction: dir });
    return;
  }

  // Not walkable (wall, guard, etc.) — face only, send once on direction change
  if (!wasAlreadyFacing) {
    sendToServer({ type: "face", direction: dir });
  }
}

function processMovement() {
  const dir = getActiveDirection();

  if (G.moveState) {
    const ms = G.moveState;
    ms.progress += MOVE_SPEED;

    // Commit logic
    if (!ms.committed) {
      if (ms.progress >= COMMIT_THRESHOLD) {
        // Past threshold — commit regardless of key state
        ms.committed = true;
        G.myPlayer.x = ms.toX;
        G.myPlayer.y = ms.toY;
        sendToServer({ type: "move", direction: ms.dir });
        G.pendingMoves.push({ x: ms.toX, y: ms.toY });
      } else if (!dir) {
        // TAP — no direction held, cancel and snap back
        sendToServer({ type: "face", direction: ms.dir });
        G.displayX = ms.fromX;
        G.displayY = ms.fromY;
        G.moveState = null;
        G.isMoving = false;
        return;
      }
    }

    // Buffer different direction input
    if (dir && dir !== ms.dir) {
      G.inputBuffer = dir;
    }

    if (ms.progress >= 1.0) {
      // Move complete
      G.displayX = ms.toX;
      G.displayY = ms.toY;
      G.moveState = null;

      // Chain next move from buffer or held key
      const nextDir = G.inputBuffer || dir;
      G.inputBuffer = null;
      if (nextDir) {
        stopDance(G.myName);
        tryStartMove(nextDir);
      }
      G.isMoving = !!G.moveState;
    } else {
      // Interpolate display position at constant speed
      G.displayX = ms.fromX + (ms.toX - ms.fromX) * ms.progress;
      G.displayY = ms.fromY + (ms.toY - ms.fromY) * ms.progress;
      G.isMoving = true;
    }

    // Safety: clear stale predictions
    if (G.pendingMoves.length > 10) {
      G.pendingMoves = [];
      G.moveState = null;
      G.inputBuffer = null;
    }
  } else {
    // Not moving — try to start
    if (dir) {
      stopDance(G.myName);
      tryStartMove(dir);
      G.isMoving = !!G.moveState;
    } else {
      G.isMoving = false;
    }
  }
}

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  // Animation timer
  G.animTimer++;
  if (G.animTimer % 10 === 0) {
    G.animFrame = (G.animFrame + 1) % 2;
  }

  // Process movement (freeze while attacking or dying)
  if (!G.chatFocused && !G.transition && !G.attackingPlayers[G.myName] && !G.dyingPlayerSelf) {
    processMovement();
  }

  // Update animations
  updateDances();
  updateAttacks();
  updateDyingMonsters();
  updateSwordPickups();
  updateDyingOtherPlayers();
  updateProjectiles();
  updateAttackEffects();

  // Toggle monster hop frame every ~500ms
  G.monsterHopTimer++;
  if (G.monsterHopTimer % 30 === 0) {
    G.monsterHopFrame = (G.monsterHopFrame + 1) % 2;
  }

  // Interpolate positions — player uses prediction (processMovement), lerp as fallback
  if (G.myPlayer && !G.moveState) {
    if (G.displayX !== G.myPlayer.x || G.displayY !== G.myPlayer.y) {
      G.displayX += (G.myPlayer.x - G.displayX) * MOVE_LERP;
      G.displayY += (G.myPlayer.y - G.displayY) * MOVE_LERP;
      if (Math.abs(G.myPlayer.x - G.displayX) < 0.05) G.displayX = G.myPlayer.x;
      if (Math.abs(G.myPlayer.y - G.displayY) < 0.05) G.displayY = G.myPlayer.y;
    }
  }

  for (const p of Object.values(G.otherPlayers)) {
    p.displayX += (p.x - p.displayX) * MOVE_LERP;
    p.displayY += (p.y - p.displayY) * MOVE_LERP;
    if (Math.abs(p.x - p.displayX) < 0.05) p.displayX = p.x;
    if (Math.abs(p.y - p.displayY) < 0.05) p.displayY = p.y;
    p.moving = (p.displayX !== p.x || p.displayY !== p.y);
  }

  for (const m of G.monsters) {
    m.displayX += (m.x - m.displayX) * MOVE_LERP;
    m.displayY += (m.y - m.displayY) * MOVE_LERP;
    if (Math.abs(m.x - m.displayX) < 0.05) m.displayX = m.x;
    if (Math.abs(m.y - m.displayY) < 0.05) m.displayY = m.y;
  }

  // Render
  G.ctx.clearRect(0, 0, CW, CH);

  if (renderConjuring(Date.now())) {
    // Conjuring animation is active — skip normal rendering
  } else if (G.transition) {
    renderTransition(Date.now());
  } else {
    renderRoom();
    renderAreaWarnings();
    renderHeartPickups();
    renderChargePreps();
    renderChargeTrails();
    renderPlayers();
    renderProjectiles();
    renderMonsterAttackFlashes();
    renderSpeechBubbles();
    renderSwordPickups();
    renderUI();
    renderBossDeathEffect();
    renderDungeonDebug();
    renderDungeonMinimap();
    if (G.dyingPlayerSelf) renderDeathAnimation();
  }
  renderHeartsHUD();
}
</script>
<!-- Input must load after DOM refs are bound and functions defined -->
<script src="input.js?v=3"></script>
</body>
</html>
